name: Build OpenWrt GL-MT5000

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev \
            libssl-dev python3-distutils python3-setuptools rsync \
            swig unzip zlib1g-dev file wget

      - name: Update and install feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure for GL-MT5000
        run: |
          cat > .config << 'EOF'
          CONFIG_TARGET_mediatek=y
          CONFIG_TARGET_mediatek_filogic=y
          CONFIG_TARGET_mediatek_filogic_DEVICE_glinet_gl-mt5000=y
          CONFIG_TARGET_ROOTFS_PARTSIZE=7000
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-ssl=y
          CONFIG_PACKAGE_wget-ssl=y
          CONFIG_PACKAGE_curl=y
          CONFIG_PACKAGE_unzip=y
          CONFIG_PACKAGE_iptables=y
          CONFIG_PACKAGE_iptables-mod-tproxy=y
          CONFIG_PACKAGE_ip-full=y
          CONFIG_PACKAGE_ipset=y
          CONFIG_PACKAGE_kmod-ipt-tproxy=y
          EOF
          make defconfig

      - name: Download sources
        run: make download -j8

      - name: Build
        run: make -j$(nproc) V=s 2>&1 | tee build.log | grep -E "^(make|ERROR|WARNING)" || true

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-gl-mt5000
          path: |
            bin/targets/mediatek/filogic/openwrt-mediatek-filogic-glinet_gl-mt5000-squashfs-sysupgrade.bin
          retention-days: 30

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 3